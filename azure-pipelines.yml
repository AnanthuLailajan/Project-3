trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release'
  PUBLISH_DIR: '$(Build.ArtifactStagingDirectory)/publish'
  ARTIFACT_NAME: 'drop'

  # ✅ Make sure this EXACTLY matches Azure DevOps
  AZURE_SERVICE_CONNECTION: 'ananthuappconnec'

  APP_DEV: 'mywebapp-dev'
  APP_STG: 'mywebapp-stg'
  APP_PRD: 'mywebapp-prd'

stages:

# ==========================================
# ✅ BUILD + TEST + PACKAGE
# ==========================================
- stage: Build_Test
  displayName: "CI — Build, Test, Publish"
  jobs:
  - job: BuildJob
    displayName: Build & Test
    steps:

    # Install .NET
    - task: UseDotNet@2
      displayName: "Use .NET SDK $(DOTNET_VERSION)"
      inputs:
        packageType: 'sdk'
        version: '$(DOTNET_VERSION)'

    # ✅ IMPORTANT: shows repo structure
    - script: ls -R
      displayName: "List repo files"

    # ✅ Restore (auto finds projects)
    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: '*/.csproj'

    # ✅ Build
    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: '*/.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION)'

    # ✅ Test (finds test projects automatically)
    - task: DotNetCoreCLI@2
      displayName: 'Test'
      inputs:
        command: 'test'
        projects: '*/*Tests/.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION)'

    # ✅ Publish
    - task: DotNetCoreCLI@2
      displayName: 'Publish'
      inputs:
        command: 'publish'
        projects: '*/.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION) --output $(PUBLISH_DIR)'

    # Zip package
    - task: ArchiveFiles@2
      displayName: 'Create ZIP Package'
      inputs:
        rootFolderOrFile: '$(PUBLISH_DIR)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    # Publish artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: '$(ARTIFACT_NAME)'

# ==========================================
# ✅ DEPLOY DEV
# ==========================================
- stage: Deploy_Dev
  displayName: "CD — Deploy to Dev"
  dependsOn: Build_Test
  condition: succeeded()
  jobs:
  - deployment: DeployDev
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: '$(ARTIFACT_NAME)'

          - task: AzureWebApp@1