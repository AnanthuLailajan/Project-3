trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release'

  # Artifact settings
  ARTIFACT_NAME: 'drop'
  PUBLISH_DIR: '$(Build.ArtifactStagingDirectory)/publish'

  # Azure App Service Names
  APP_DEV: 'mywebapp-dev'
  APP_STG: 'mywebapp-stg'
  APP_PRD: 'mywebapp-prd'

  # Azure DevOps Service Connection
  AZURE_SERVICE_CONNECTION: 'ananthuappconnec'

stages:

# =====================================================
# CI STAGE
# =====================================================
- stage: Build_Test
  displayName: 'CI - Restore Build Test Publish'

  jobs:
  - job: Build
    displayName: 'Build Job'

    steps:

    # Checkout source code
    - checkout: self

    # Install .NET SDK
    - task: UseDotNet@2
      displayName: 'Install .NET SDK'
      inputs:
        packageType: 'sdk'
        version: '$(DOTNET_VERSION)'

    # Debug repository structure (temporary but useful)
    - script: |
        echo "Current Directory:"
        pwd

        echo "Repository Structure:"
        ls -R

        echo "Searching for csproj files..."
        find . -name "*.csproj"

        echo "Searching for solution files..."
        find . -name "*.sln"
      displayName: 'Debug Repository Structure'

    # Restore NuGet packages
    - task: DotNetCoreCLI@2
      displayName: 'Restore'
      inputs:
        command: 'restore'
        projects: 'dotnetwebapp/*.csproj'

    # Build application
    - task: DotNetCoreCLI@2
      displayName: 'Build'
      inputs:
        command: 'build'
        projects: 'dotnetwebapp/*.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION)'

    # Run tests
    - task: DotNetCoreCLI@2
      displayName: 'Run Tests'
      inputs:
        command: 'test'
        projects: 'dotnetwebapp/*.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION)'

    # Publish application
    - task: DotNetCoreCLI@2
      displayName: 'Publish Web App'
      inputs:
        command: 'publish'
        publishWebProjects: false
        projects: 'dotnetwebapp/*.csproj'
        arguments: '--configuration $(BUILD_CONFIGURATION) --output $(PUBLISH_DIR)'
        zipAfterPublish: false

    # Create ZIP package
    - task: ArchiveFiles@2
      displayName: 'Create ZIP Package'
      inputs:
        rootFolderOrFile: '$(PUBLISH_DIR)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    # Publish pipeline artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Publish Pipeline Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: '$(ARTIFACT_NAME)'

# =====================================================
# DEPLOY TO DEV
# =====================================================
- stage: Deploy_Dev
  displayName: 'Deploy to Dev'
  dependsOn: Build_Test
  condition: succeeded()

  jobs:
  - deployment: DeployDev
    displayName: 'Deploy Dev'
    environment: 'dev'

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - download: current
            artifact: '$(ARTIFACT_NAME)'

          # Deploy to Azure App Service
          - task: AzureWebApp@1
            displayName: 'Deploy to Dev App Service'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              appName: '$(APP_DEV)'
              package: '$(Pipeline.Workspace)/$(ARTIFACT_NAME)/app.zip'

# =====================================================
# DEPLOY TO STAGING
# =====================================================
- stage: Deploy_Staging
  displayName: 'Deploy to Staging'
  dependsOn: Deploy_Dev
  condition: succeeded()

  jobs:
  - deployment: DeployStaging
    displayName: 'Deploy Staging'
    environment: 'staging'

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - download: current
            artifact: '$(ARTIFACT_NAME)'

          # Deploy to Azure App Service
          - task: AzureWebApp@1
            displayName: 'Deploy to Staging App Service'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              appName: '$(APP_STG)'
              package: '$(Pipeline.Workspace)/$(ARTIFACT_NAME)/app.zip'

# =====================================================
# DEPLOY TO PRODUCTION
# =====================================================
- stage: Deploy_Prod
  displayName: 'Deploy to Production'
  dependsOn: Deploy_Staging
  condition: succeeded()

  jobs:
  - deployment: DeployProd
    displayName: 'Deploy Production'
    environment: 'production'

    strategy:
      runOnce:
        deploy:
          steps:

          # Download artifact
          - download: current
            artifact: '$(ARTIFACT_NAME)'

          # Deploy to Azure App Service
          - task: AzureWebApp@1
            displayName: 'Deploy to Production App Service'
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              appName: '$(APP_PRD)'
              package: '$(Pipeline.Workspace)/$(ARTIFACT_NAME)/app.zip'