trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  DOTNET_VERSION: '8.0.x'
  BUILD_CONFIGURATION: 'Release'
  PUBLISH_DIR: '$(Build.ArtifactStagingDirectory)/publish'
  ARTIFACT_NAME: 'drop'
  AZURE_SERVICE_CONNECTION: 'ananthuappconnec'   # ⚠️ ensure this exists exactly
  APP_DEV: 'mywebapp-dev'
  APP_STG: 'mywebapp-stg'
  APP_PRD: 'mywebapp-prd'

stages:

# =========================
# ✅ BUILD + TEST
# =========================
- stage: Build_Test
  displayName: "CI — Build, Test, Publish"
  jobs:
  - job: BuildJob
    displayName: Build & Test
    steps:

    - task: UseDotNet@2
      displayName: "Use .NET SDK $(DOTNET_VERSION)"
      inputs:
        packageType: 'sdk'
        version: '$(DOTNET_VERSION)'

    # ✅ DEBUG (helps confirm structure)
    - script: ls -R
      displayName: "List repo files"

    - script: dotnet restore
      displayName: 'Restore'

    - script: dotnet build --configuration $(BUILD_CONFIGURATION)
      displayName: 'Build'

    - script: dotnet test --configuration $(BUILD_CONFIGURATION)
      displayName: 'Test'

    - script: dotnet publish --configuration $(BUILD_CONFIGURATION) --output "$(PUBLISH_DIR)"
      displayName: 'Publish'

    - task: ArchiveFiles@2
      displayName: 'Create ZIP Package'
      inputs:
        rootFolderOrFile: '$(PUBLISH_DIR)'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: 'Publish Artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)'
        artifact: '$(ARTIFACT_NAME)'

# =========================
# ✅ DEPLOY DEV
# =========================
- stage: Deploy_Dev
  dependsOn: Build_Test
  jobs:
  - deployment: DeployDev
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: '$(ARTIFACT_NAME)'

          - task: AzureWebApp@1
            displayName: "Deploy to Dev"
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              appName: '$(APP_DEV)'
              package: '$(Pipeline.Workspace)/$(ARTIFACT_NAME)/app.zip'

# =========================
# ✅ DEPLOY STAGING
# =========================
- stage: Deploy_Staging
  dependsOn: Deploy_Dev
  jobs:
  - deployment: DeployStaging
    environment: 'staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: '$(ARTIFACT_NAME)'

          - task: AzureWebApp@1
            displayName: "Deploy to Staging"
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              appName: '$(APP_STG)'
              package: '$(Pipeline.Workspace)/$(ARTIFACT_NAME)/app.zip'

# =========================
# ✅ DEPLOY PROD
# =========================
- stage: Deploy_Prod
  dependsOn: Deploy_Staging
  jobs:
  - deployment: DeployProd
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: '$(ARTIFACT_NAME)'

          - task: AzureWebApp@1
            displayName: "Deploy to Production"
            inputs:
              azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
              appName: '$(APP_PRD)'
              package: '$(Pipeline.Workspace)/$(ARTIFACT_NAME)/app.zip'